<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot Text Extractor & Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

.left {
    width: 50%;
    padding: 20px;
    background: #1e1e1e;
    overflow: auto;
    display: flex;
    flex-direction: column;
}

.right {
    width: 50%;
    padding: 20px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 80%;
    background: black;
    color: #00ff90;
    border: none;
    padding: 15px;
    font-size: 16px;
    font-family: 'Courier New', Courier, monospace; 
    white-space: pre; 
    overflow-wrap: normal;
    overflow-x: scroll;
    box-sizing: border-box;
}

/* Naye Checklist UI ke liye CSS */
.checklist-box {
    width: 100%;
    height: 80%;
    background: black;
    color: #00ff90;
    padding: 15px;
    font-size: 16px;
    overflow-y: auto;
    box-sizing: border-box;
    display: none; /* Initially hidden */
}

.check-item {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    font-size: 18px;
    background: #222;
    padding: 10px;
    border-radius: 5px;
}

.check-item input[type="checkbox"] {
    margin-right: 15px;
    width: 20px;
    height: 20px;
    cursor: pointer;
}

.check-item span {
    transition: all 0.2s ease-in-out;
}

.cut-text {
    text-decoration: line-through;
    color: #777; /* Dim color when cut */
}

img {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 10px;
    max-height: 50vh;
    object-fit: contain;
}

button {
    padding: 12px 25px;
    margin-top: 15px;
    font-size: 16px;
    cursor:pointer;
    background: #00ff90;
    color: black;
    border: none;
    font-weight: bold;
    border-radius: 5px;
}

button:hover {
    background: #00cc73;
}

.pastebox {
    margin-top: 20px;
    padding: 20px;
    border: 2px dashed #666;
    background: #222;
}

.button-group {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
</style>
</head>

<body>

<div class="container">
    <div class="left">
        <h2>Extracted Text & Checklist</h2>
        
        <!-- Textarea (Default) -->
        <textarea id="result" placeholder="Your extracted code will appear here..."></textarea>
        
        <!-- Checklist Container (Naya Option) -->
        <div id="checklistContainer" class="checklist-box"></div>
        
        <div class="button-group">
            <button onclick="copyText()">Copy Text</button>
            <button onclick="copyForExcel()" style="background: #00bfff; color: white;">Copy for Excel</button>
            <!-- Toggle Button Added Here -->
            <button id="toggleViewBtn" onclick="makeChecklist()" style="background: #ffaa00; color: black;">Make Checklist</button>
        </div>
    </div>

    <div class="right">
        <h2>Upload / Paste Screenshot</h2>
        <input type="file" id="imageInput" accept="image/*">

        <div class="pastebox">
            Press <b>Ctrl + V</b> to paste screenshot
        </div>

        <img id="preview" alt="Preview Appears Here">
        <br>
        <button onclick="extractText()">Extract Text</button>
    </div>
</div>

<script>
let imageFile;

// 1. FILE UPLOAD EVENT
document.getElementById("imageInput").addEventListener("change", function(e){
    if(e.target.files[0]) {
        imageFile = e.target.files[0];
        document.getElementById("preview").src = URL.createObjectURL(imageFile);
    }
});

// 2. PASTE SCREENSHOT EVENT (CTRL + V)
document.addEventListener("paste", function(e){
    const items = e.clipboardData.items;
    for (let item of items){
        if(item.type.indexOf("image") !== -1){
            imageFile = item.getAsFile();
            document.getElementById("preview").src = URL.createObjectURL(imageFile);
            extractText(); // Auto-extract on paste
        }
    }
});

// 3. TEXT EXTRACTION LOGIC
async function extractText(){
    if (!imageFile) {
        document.getElementById("result").value = "Please upload or paste an image first.";
        return;
    }

    // Default back to text view before extracting
    showRawText();
    document.getElementById("result").value = "Processing image... Scanning all characters carefully.";

    const img = new Image();
    img.src = URL.createObjectURL(imageFile);

    img.onload = async () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const scale = 3; 
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        
        ctx.imageSmoothingEnabled = true; 
        
        ctx.filter = 'grayscale(100%) contrast(150%) brightness(120%)';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        try {
            const worker = await Tesseract.createWorker('eng');

            const exactWhitelist = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789`~!@#$%^&*()-_=+[]{}\\|;:\'",.<>/? \n\t';

            await worker.setParameters({
                preserve_interword_spaces: '1', 
                tessedit_pageseg_mode: '6', 
                tessedit_char_whitelist: exactWhitelist 
            });

            const { data: { text } } = await worker.recognize(canvas);

            let cleanText = text;
            cleanText = cleanText.replace(/getElementByld/g, "getElementById");
            cleanText = cleanText.replace(/  [iI]$/gm, "");
            cleanText = cleanText.replace(/5@/g, "50");

            document.getElementById("result").value = cleanText;

            await worker.terminate(); 
        } catch (error) {
            document.getElementById("result").value = "Error processing image: " + error.message;
        }
    };
}

// 4. NORMAL COPY FUNCTION
function copyText() {
    const text = document.getElementById("result").value;
    if (!text || text.includes("Processing image")) {
        alert("Pehle text extract karo bhai!");
        return;
    }
    
    navigator.clipboard.writeText(text).then(() => {
        alert("Normal Text copied!");
    }).catch(err => {
        console.error('Copy failed: ', err);
    });
}

// 5. EXCEL PASTE COPY FUNCTION
function copyForExcel() {
    const text = document.getElementById("result").value;
    if (!text || text.includes("Processing image")) {
        alert("Pehle text extract karo bhai!");
        return;
    }

    const excelText = text.split('\n').map(line => {
        return line.trim().replace(/\s{2,}/g, '\t');
    }).join('\n');

    navigator.clipboard.writeText(excelText).then(() => {
        alert("Copied for Excel! Ab sidha Excel me jao aur Ctrl+V dabao.");
    }).catch(err => {
        console.error('Excel Copy failed: ', err);
    });
}

// 6. MAKE CHECKLIST FUNCTION (NEW)
function makeChecklist() {
    const text = document.getElementById("result").value;
    if (!text || text.includes("Processing image")) {
        alert("Pehle text extract karo bhai!");
        return;
    }

    // Line by line extract kar ke empty lines hata rahe hain
    const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
    
    const container = document.getElementById("checklistContainer");
    container.innerHTML = ''; // Pehle ka data clear karein
    
    lines.forEach((line, index) => {
        const div = document.createElement("div");
        div.className = "check-item";
        
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = "chk_" + index;
        
        const span = document.createElement("span");
        span.innerText = line;
        
        // Checkbox pe click hone par class toggle hogi
        checkbox.addEventListener("change", function() {
            if(this.checked) {
                span.classList.add("cut-text"); // Text pe line-through
            } else {
                span.classList.remove("cut-text"); // Line-through hatao
            }
        });
        
        div.appendChild(checkbox);
        div.appendChild(span);
        container.appendChild(div);
    });
    
    // UI toggle karna (Textarea hide, Checklist show)
    document.getElementById("result").style.display = "none";
    container.style.display = "block";
    
    // Button ko "Show Raw Text" mein badalna
    const btn = document.getElementById("toggleViewBtn");
    btn.innerText = "Show Raw Text";
    btn.setAttribute("onclick", "showRawText()");
    btn.style.background = "#ff4444"; 
    btn.style.color = "white";
}

// 7. WAPAS TEXT DEKHNE KE LIYE FUNCTION (NEW)
function showRawText() {
    document.getElementById("result").style.display = "block";
    document.getElementById("checklistContainer").style.display = "none";
    
    const btn = document.getElementById("toggleViewBtn");
    btn.innerText = "Make Checklist";
    btn.setAttribute("onclick", "makeChecklist()");
    btn.style.background = "#ffaa00"; 
    btn.style.color = "black";
}
</script>

</body>
</html>
